<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>海悅廣告｜土地評估 Clean</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="土地評估">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f1ea;color:#111;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif}.top{position:sticky;top:0;z-index:9;background:rgba(244,241,234,.96);border-bottom:1px solid #ddd;backdrop-filter:blur(10px)}h1{margin:0;padding:14px 14px 4px;font-size:25px}.sub{padding:0 14px 12px;color:#666;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tabs{display:flex;gap:10px;overflow-x:auto;padding:10px 12px 14px}.tab{border:2px solid #ddd;background:#fff;color:#111;border-radius:999px;padding:12px 18px;font-weight:900;font-size:16px;white-space:nowrap}.tab.on{background:#111;color:#fff;border-color:#111}.wrap{max-width:1180px;margin:0 auto;padding:14px}.card{background:#fff;border:1px solid #ddd;border-radius:22px;padding:18px;margin-bottom:14px;box-shadow:0 8px 24px rgba(0,0,0,.04)}h2{font-size:23px;margin:0 0 14px}.notice{background:#eaf8ee;border:1px solid #a7ddb3;color:#215f31;border-radius:18px;padding:14px 16px;line-height:1.7;font-weight:800;margin-bottom:16px}.field{margin:12px 0}.field label{display:block;font-weight:900;margin-bottom:7px}input,textarea{width:100%;border:1.5px solid #ccc;border-radius:15px;padding:13px 15px;font-size:17px;line-height:1.5;background:#fff}textarea{min-height:120px;resize:vertical}.actions{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}button{border:1px solid #111;background:#111;color:#fff;border-radius:14px;padding:12px 16px;font-weight:900;font-size:16px}button.sec{background:#fff;color:#111}.page{display:none}.page.on{display:block}.layout{display:grid;grid-template-columns:390px 1fr;gap:16px}.reportbox{background:#d8d8d8;border-radius:18px;padding:12px;overflow:auto}.sheet{width:1180px;background:#fff;padding:14px;margin:0 auto}.report{width:100%;border-collapse:collapse;table-layout:fixed;font-size:12px;line-height:1.35;color:#111}.report td,.report th{border:1.2px solid #111;padding:6px 7px;vertical-align:top;white-space:pre-wrap;word-break:break-word;color:#111;-webkit-text-fill-color:#111}.report th{background:#f3eee5;text-align:center}.title{font-size:22px;font-weight:900;text-align:center;letter-spacing:.16em}.label{font-weight:900;text-align:center;background:#fff}.map{height:180px;display:flex;align-items:center;justify-content:center;background:linear-gradient(45deg,transparent 48%,#eee 49%,#eee 51%,transparent 52%),linear-gradient(-45deg,transparent 48%,#eee 49%,#eee 51%,transparent 52%);background-size:24px 24px;color:#666}.print-area{display:none}[contenteditable=true]:focus{outline:2px solid #111;background:#fff8cf}@media(max-width:900px){.wrap{padding:0}.card{margin:0 8px 14px}.layout{display:block}.reportbox{border-radius:0}.sheet{transform:scale(.32);transform-origin:top left;margin-bottom:-570px}h1{font-size:24px}.tab{font-size:16px}}@page{size:A4 landscape;margin:8mm}@media print{body{background:#fff!important}.top,.wrap{display:none!important}.print-area{display:block!important;position:absolute;left:0;top:0;width:100%;background:#fff}.print-area *{color:#000!important;-webkit-text-fill-color:#000!important}.print-area .sheet{width:100%!important;transform:none!important;margin:0!important;padding:0!important}.print-area .report{font-size:8.8px!important}.print-area td,.print-area th{padding:3.2px 4px!important;border:1px solid #000!important}.print-area .title{font-size:16px!important}.print-area .map{height:140px!important;background:#fff!important}}
</style>
</head>
<body>
<header class="top"><h1>土地評估手機版應用程式｜Clean</h1><div class="sub">修正版：回貼 JSON 後只顯示中文整理結果，不顯示 JSON 欄位名稱或 [object Object]。</div><nav class="tabs"><button class="tab on" onclick="tab('req',this)">調研需求</button><button class="tab" onclick="tab('json',this)">調研結果</button><button class="tab" onclick="tab('edit',this)">結論調整</button><button class="tab" onclick="tab('preview',this)">表格預覽</button></nav></header>
<main class="wrap">
<section id="req" class="page on"><div class="card"><h2>只輸入建設公司＋地段地號</h2><div class="notice">輸入建設公司與地號後，按「產生調研指令」。ChatGPT 回傳 JSON 後貼回「調研結果」，表格會自動轉成中文結果。</div><div class="field"><label>配合業主／建設公司名稱</label><input id="developer" placeholder="例：弘峻建設"></div><div class="field"><label>土地地段與地號</label><textarea id="landIds" placeholder="例：桃園市中壢區新明段1057地號"></textarea></div><div class="actions"><button onclick="makePrompt()">產生調研指令</button><button class="sec" onclick="copyPrompt()">複製調研指令</button></div><textarea id="promptBox" style="min-height:520px"></textarea></div></section>
<section id="json" class="page"><div class="card"><h2>貼上 ChatGPT 調研 JSON</h2><div class="notice">請只貼 JSON。套用後表格會自動轉成中文結果，不會顯示 JSON 原始欄位。</div><textarea id="jsonBox" placeholder="請貼上 JSON" style="min-height:420px"></textarea><div class="actions"><button onclick="applyJson()">套用調研結果</button><button class="sec" onclick="downloadTemplate()">下載 JSON 模板</button></div></div></section>
<section id="edit" class="page"><div class="layout"><div class="card"><h2>結論與價格調整</h2><div class="field"><label>區域銷況</label><textarea id="market_status"></textarea></div><div class="field"><label>建議產品</label><textarea id="product_suggestion"></textarea></div><div class="field"><label>價格預判</label><textarea id="price_forecast"></textarea></div><div class="field"><label>車位價格分析</label><textarea id="parking_price_analysis"></textarea></div><div class="field"><label>優勢</label><textarea id="strengths"></textarea></div><div class="field"><label>劣勢</label><textarea id="weaknesses"></textarea></div><div class="field"><label>初步結論</label><textarea id="conclusion"></textarea></div><div class="field"><label>待複核事項</label><textarea id="items_to_verify"></textarea></div><div class="actions"><button onclick="readEdits();render();tabById('preview')">更新預覽</button><button class="sec" onclick="exportXlsx()">匯出 Excel</button><button class="sec" onclick="printReport()">列印 / 存 PDF</button></div></div><div class="reportbox"><div id="sheetEdit" class="sheet"></div></div></div></section>
<section id="preview" class="page"><div class="card"><h2>表格預覽</h2><p>表格文字可直接修改。</p><div class="actions"><button onclick="exportXlsx()">匯出 Excel</button><button class="sec" onclick="printReport()">列印 / 存 PDF</button></div></div><div class="reportbox"><div id="sheet" class="sheet"></div></div></section>
</main><div id="printArea" class="print-area"></div>
<script>
let data={report_title:'海悅廣告 土地評估分析表',developer:'',research_date:'',pdf_filename_rule:'',basic_info:{},land_parcels:[],land_area_summary:{},zoning_and_bulk:{},road_condition:{},site_conditions:{},environment:{},school_and_village:{},market_status:{},case_comparison:[],parking_price_analysis:{},price_forecast:{},product_suggestion:{},strengths:[],weaknesses:[],conclusion:'',sources:[],items_to_verify:[]};
const labels={zoning:'土地分區',coverage_rate:'建蔽率',far:'容積率',buildable_area:'可建築面積',legal_floor_area:'法定容積樓地板面積',note:'備註',source:'資料來源'};
function $(id){return document.getElementById(id)}function val(id){return ($(id)?.value||'').trim()}function today(){const d=new Date();return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`}function esc(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function clean(v,f='待複核'){if(v===undefined||v===null||v==='')return f;return String(v)}function tab(id,b){document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));$(id).classList.add('on');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));if(b)b.classList.add('on');if(id==='preview'||id==='edit')render()}function tabById(id){document.querySelectorAll('.tab').forEach(b=>{if((id==='preview'&&b.textContent.includes('預覽'))||(id==='edit'&&b.textContent.includes('調整')))b.click()})}
function listText(x){if(!x)return '待複核'; if(Array.isArray(x))return x.map((v,i)=>typeof v==='object'?humanObject(v):` ${v}`).join('\n'); if(typeof x==='object')return humanObject(x); return String(x)}
function humanObject(o){if(!o)return '待複核'; if(typeof o!=='object')return String(o); let out=[]; for(const [k,v] of Object.entries(o)){if(v===undefined||v===null||v==='')continue; if(typeof v==='object')out.push(`${labels[k]||cnKey(k)}：${listText(v)}`); else out.push(`${labels[k]||cnKey(k)}：${v}`)} return out.join('\n')||'待複核'}
function cnKey(k){const map={parcel_no:'地號',area_sqm:'面積',area_ping:'坪數',conversion_formula:'換算公式',total_area_sqm:'合計平方公尺',total_area_ping:'合計坪數',road_frontage_type:'臨路型態',road_name:'路名',road_width:'路寬',is_corner_lot:'角地條件',road_or_neighbor:'臨路／鄰地',building_type:'臨房型態',building_height:'樓層',resistance:'抗性',condition:'現況',elementary_school:'國小',junior_high_school:'國中',village:'里別'};return map[k]||k}
function formatParcels(){const arr=data.land_parcels||[];let rows=[];arr.forEach(p=>{if(typeof p==='string')rows.push(p);else rows.push(`${clean(p.parcel_no||p.id||'地號')}：${clean(p.area_ping||p.area||'待謄本／地籍資料複核')}（${clean(p.area_sqm,'')}㎡）`) }); const s=data.land_area_summary||{}; if(s.total_area_ping||s.total)rows.push(`合計：約${s.total_area_ping||s.total}坪${s.total_area_sqm?'（'+s.total_area_sqm+'㎡）':''}`); return rows.join('\n')||'待逐筆查詢各地號實際坪數並加總'}
function formatZoning(){const z=data.zoning_and_bulk||{};return [`土地分區：${clean(z.zoning)}`,`建蔽率：${clean(z.coverage_rate)}`,`容積率：${clean(z.far)}`,z.buildable_area?`可建築面積：${z.buildable_area}`:'',z.legal_floor_area?`法定容積樓地板面積：${z.legal_floor_area}`:'',z.note?`備註：${z.note}`:''].filter(Boolean).join('\n')}
function formatRoad(){const r=data.road_condition||{};return [`臨路型態：${clean(r.road_frontage_type||r.type)}`,r.road_name?`臨路路名：${r.road_name}`:'',r.road_width?`道路寬度：${r.road_width}`:'',r.is_corner_lot?`角地條件：${r.is_corner_lot}`:'',r.note?`說明：${r.note}`:''].filter(Boolean).join('\n')||'待查臨路條件'}
function formatSite(){const s=data.site_conditions||{};const dirs=[['north','北向'],['south','南向'],['west','西向'],['east','東向'],['northeast','東北向'],['southeast','東南向'],['southwest','西南向'],['northwest','西北向']];let rows=[];dirs.forEach(([k,n])=>{const v=s[k]; if(!v)return; if(typeof v==='string')rows.push(`${n}：${v}`); else rows.push(`${n}：${[v.condition,v.road_name?`臨${v.road_name}`:'',v.road_width?`路寬${v.road_width}`:'',v.building_type?`臨房${v.building_type}`:'',v.building_height?`${v.building_height}`:'',v.resistance?`抗性：${v.resistance}`:'',v.note].filter(Boolean).join('，')}`)}); return rows.join('\n')||'待依實際地圖判讀四向現況'}
function formatSchool(){const s=data.school_and_village||{};return [`里別：${clean(s.village)}`,`國小：${clean(s.elementary_school)}`,`國中：${clean(s.junior_high_school)}`,s.note?`備註：${s.note}`:''].filter(Boolean).join('\n')}
function formatEnvPart(part){const e=data.environment||{};return listText(e[part])}
function formatCases(){let rows='';const arr=data.case_comparison||[];for(let i=0;i<4;i++){const c=arr[i]||{};rows+=`<tr><td>${i+1}</td><td contenteditable="true">${esc(c.developer||c.builder||'待查')}</td><td contenteditable="true">${esc(c.case_name||c.project||'待查')}</td><td contenteditable="true">${esc(c.type||'待查')}</td><td contenteditable="true">距離：${esc(c.distance_from_site||c.distance||'待以地圖複核')}\n屋齡：${esc(c.age||'待建物資料複核')}</td><td contenteditable="true">${esc(c.avg_price_6m||c.avg6||'待查')}｜${esc(c.transaction_count_6m||c.count6||'0')}筆</td><td contenteditable="true">${esc(c.avg_price_12m||c.avg12||'待查')}｜${esc(c.transaction_count_12m||c.count12||'0')}筆</td><td contenteditable="true">${esc(c.adopted_price||c.adoptedAvg||'待查')}</td><td contenteditable="true">${esc(c.product_plan||c.sizeRange||'待補')}</td><td contenteditable="true">${esc(c.reference_value||c.note||'待補')}</td></tr>`}return rows}
function makePrompt(){const developer=val('developer')||'待提供';const landIds=val('landIds')||'待提供';const p=`【海悅廣告｜土地評估調研邏輯｜最新版完整整合版】\n\n請依照固定「海悅廣告 土地評估分析表」模式完成土地調研。最後只輸出可貼入 App 的 JSON，不要加 Markdown、不要加前言、不要加「以下是」。\n\n配合業主：${developer}\n標的地號：${landIds}\n調研時間：請抓今天日期。\n\n核心要求：基地面積逐筆查詢並換算坪數；土地分區、建蔽率、容積率需查都市計畫與分區資料；臨路條件需判斷單面、雙面、三面或四面臨路；基地四向現況需依實際地圖、衛星圖、街景、地籍圖判讀；學區查教育局最新公告；里別查戶政或區公所里界；競案以距離最近且客戶會比較為優先，預售案盡量找滿4個，不足補5年內、5至10年、10至15年；成交均價以內政部實價登錄為主，不採開價；車位價格以周邊實際車位行情為核心，公式只作合理性檢查；優劣勢需能直接與業主討論，劣勢只寫已確認抗性，待複核事項放 items_to_verify。\n\n請輸出 JSON，欄位固定包含：report_title, developer, research_date, pdf_filename_rule, basic_info, land_parcels, land_area_summary, zoning_and_bulk, road_condition, site_conditions, environment, school_and_village, market_status, case_comparison, parking_price_analysis, price_forecast, product_suggestion, strengths, weaknesses, conclusion, sources, items_to_verify。\n\nland_parcels 每筆包含 parcel_no, area_sqm, area_ping, conversion_formula, source, note。case_comparison 每筆包含 developer, case_name, type, distance_from_site, age, avg_price_6m, transaction_count_6m, avg_price_12m, transaction_count_12m, adopted_price, adopted_period, product_plan, parking_price, reference_value, source, note。`; $('promptBox').value=p;return p}
async function copyPrompt(){if(!val('promptBox'))makePrompt();await navigator.clipboard.writeText(val('promptBox'));alert('已複製調研指令')}
function applyJson(){try{let t=val('jsonBox').replace(/^```json/i,'').replace(/```$/,'').trim();data=JSON.parse(t);syncEdit();render();alert('已套用，已轉為中文結果')}catch(e){alert('JSON格式錯誤，請確認只貼JSON。')}}
function syncEdit(){$('developer').value=data.developer||val('developer');$('market_status').value=listText(data.market_status,'');$('product_suggestion').value=listText(data.product_suggestion,'');$('price_forecast').value=listText(data.price_forecast,'');$('parking_price_analysis').value=listText(data.parking_price_analysis,'');$('strengths').value=listText(data.strengths,'');$('weaknesses').value=listText(data.weaknesses,'');$('conclusion').value=data.conclusion||'';$('items_to_verify').value=listText(data.items_to_verify,'')}
function readEdits(){data.developer=val('developer')||data.developer;data.market_status=val('market_status')||data.market_status;data.product_suggestion=val('product_suggestion')||data.product_suggestion;data.price_forecast=val('price_forecast')||data.price_forecast;data.parking_price_analysis=val('parking_price_analysis')||data.parking_price_analysis;data.strengths=val('strengths')?val('strengths').split('\n'):data.strengths;data.weaknesses=val('weaknesses')?val('weaknesses').split('\n'):data.weaknesses;data.conclusion=val('conclusion')||data.conclusion;data.items_to_verify=val('items_to_verify')?val('items_to_verify').split('\n'):data.items_to_verify}
function render(){readEdits();const b=data.basic_info||{};const html=`<table class="report" id="reportTable"><tr><td class="title" colspan="10">海悅廣告　土地評估分析表</td></tr><tr><td class="label">配合業主</td><td colspan="4" contenteditable="true">${esc(data.developer||val('developer')||'待提供')}</td><td class="label">調研時間</td><td colspan="4" contenteditable="true">${esc(data.research_date||today())}</td></tr><tr><td class="label">標的位置</td><td colspan="4" contenteditable="true">${esc(b.location||b.site_location||'待調研')}</td><td class="label">標的地號</td><td colspan="4" contenteditable="true">${esc(b.land_ids||val('landIds')||'待提供')}</td></tr><tr><td class="label">土地分區</td><td colspan="4" contenteditable="true">${esc(formatZoning())}</td><td class="label">基地面積</td><td colspan="4" contenteditable="true">${esc(formatParcels())}</td></tr><tr><td class="label">臨路條件</td><td colspan="4" contenteditable="true">${esc(formatRoad())}</td><td class="label">土地售價</td><td colspan="4" contenteditable="true">${esc(b.land_price||'待複核')}</td></tr><tr><td class="label">學區</td><td colspan="4" contenteditable="true">${esc(formatSchool())}</td><td class="label">里別</td><td colspan="4" contenteditable="true">${esc((data.school_and_village||{}).village||'待複核')}</td></tr><tr><td class="label">基地現況</td><td colspan="9" contenteditable="true">${esc(formatSite())}</td></tr><tr><td class="label">交通動線</td><td colspan="9" contenteditable="true">${esc(formatEnvPart('traffic'))}</td></tr><tr><td class="label">生活機能</td><td colspan="9" contenteditable="true">${esc(formatEnvPart('amenity'))}</td></tr><tr><td class="label">公共建設</td><td colspan="9" contenteditable="true">${esc(formatEnvPart('public_works'))}</td></tr><tr><td class="label">區域銷況</td><td colspan="9" contenteditable="true">${esc(listText(data.market_status,'待補區域銷況'))}</td></tr><tr><td class="label">建議產品</td><td colspan="9" contenteditable="true">${esc(listText(data.product_suggestion,'待補產品建議'))}</td></tr><tr><th>個案</th><th>建設公司</th><th>案名</th><th>類型</th><th>距離/屋齡</th><th>近半年均價/筆數</th><th>近一年均價/筆數</th><th>採用均價</th><th>產品規劃</th><th>採用依據</th></tr>${formatCases()}<tr><td class="label">價格預判</td><td colspan="9" contenteditable="true">${esc(listText(data.price_forecast,'待補價格預判'))}</td></tr><tr><td class="label">車位價格</td><td colspan="9" contenteditable="true">${esc(listText(data.parking_price_analysis,'待補車位分析'))}</td></tr><tr><td class="label">優勢</td><td colspan="9" contenteditable="true">${esc(listText(data.strengths,'待補三點優勢'))}</td></tr><tr><td class="label">劣勢</td><td colspan="9" contenteditable="true">${esc(listText(data.weaknesses,'待補三點已確認抗性'))}</td></tr><tr><td class="label">初步結論</td><td colspan="9" contenteditable="true">${esc(data.conclusion||'待補初步結論')}</td></tr><tr><td class="label">資料來源</td><td colspan="9" contenteditable="true">${esc(listText(data.sources,'待補資料來源'))}</td></tr><tr><td class="label">待複核事項</td><td colspan="9" contenteditable="true">${esc(listText(data.items_to_verify,'待補複核事項'))}</td></tr><tr><td class="label">區域圖</td><td colspan="9"><div class="map" contenteditable="true">此處可貼上區域圖／基地位置圖</div></td></tr></table>`;$('sheet').innerHTML=html;$('sheetEdit').innerHTML=html}
function printReport(){render();$('printArea').innerHTML='<div class="sheet">'+$('sheet').innerHTML.replaceAll('contenteditable="true"','')+'</div>';setTimeout(()=>window.print(),50)}
function exportXlsx(){render();const table=$('sheet').querySelector('#reportTable');const arr=[];for(const tr of table.rows){const row=[];for(const cell of tr.cells)row.push(cell.innerText.trim());arr.push(row)}const wb=XLSX.utils.book_new(),ws=XLSX.utils.aoa_to_sheet(arr);ws['!cols']=[{wch:10},{wch:18},{wch:18},{wch:18},{wch:18},{wch:22},{wch:22},{wch:18},{wch:28},{wch:32}];XLSX.utils.book_append_sheet(wb,ws,'一頁式土地評估總表');XLSX.writeFile(wb,(val('developer')||data.developer||'土地評估')+'-土地評估分析表.xlsx')}
function downloadTemplate(){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='土地評估JSON模板.json';a.click()}
render();makePrompt();
</script>
</body></html>
