<style>
*{box-sizing:border-box}body{margin:0;background:#f4f1ea;color:#111;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif}.top{position:sticky;top:0;z-index:5;background:rgba(244,241,234,.96);border-bottom:1px solid #ddd;backdrop-filter:blur(10px)}h1{margin:0;padding:14px 14px 4px;font-size:26px}.subtxt{padding:0 14px 12px;color:#666;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tabs{display:flex;gap:10px;overflow-x:auto;padding:10px 12px 14px}.tab{border:2px solid #ddd;background:#fff;color:#111;border-radius:999px;padding:12px 18px;font-weight:900;font-size:16px;white-space:nowrap}.tab.on{background:#111;color:#fff;border-color:#111}.wrap{max-width:1180px;margin:0 auto;padding:14px}.card{background:#fff;border:1px solid #ddd;border-radius:22px;padding:18px;margin-bottom:14px;box-shadow:0 8px 24px rgba(0,0,0,.04)}h2{font-size:23px;margin:0 0 14px}.notice{background:#eaf8ee;border:1px solid #a7ddb3;color:#215f31;border-radius:18px;padding:14px 16px;line-height:1.7;font-weight:800;margin-bottom:16px}.field{margin:12px 0}.field label{display:block;font-weight:900;margin-bottom:7px}input,textarea{width:100%;border:1.5px solid #ccc;border-radius:15px;padding:13px 15px;font-size:18px;line-height:1.5;background:#fff}textarea{min-height:110px;resize:vertical}.actions{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}button{border:1px solid #111;background:#111;color:#fff;border-radius:14px;padding:12px 16px;font-weight:900;font-size:16px}button.sec{background:#fff;color:#111}.page{display:none}.page.on{display:block}.layout{display:grid;grid-template-columns:390px 1fr;gap:16px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.help{font-size:14px;color:#666;line-height:1.7}.reportbox{background:#d8d8d8;border-radius:18px;padding:12px;overflow:auto}.sheet{width:1120px;background:#fff;padding:14px;margin:0 auto}.report{width:100%;border-collapse:collapse;table-layout:fixed;font-size:13px;line-height:1.35;color:#111}.report td,.report th{border:1.2px solid #111;padding:6px 7px;vertical-align:top;white-space:pre-wrap;word-break:break-word;color:#111;-webkit-text-fill-color:#111}.report th{background:#f3eee5;text-align:center}.title{font-size:22px;font-weight:900;text-align:center;letter-spacing:.16em}.label{font-weight:900;text-align:center;background:#fff}.subcell{font-weight:900;text-align:center}.map{height:220px;display:flex;align-items:center;justify-content:center;background:linear-gradient(45deg,transparent 48%,#eee 49%,#eee 51%,transparent 52%),linear-gradient(-45deg,transparent 48%,#eee 49%,#eee 51%,transparent 52%);background-size:24px 24px;color:#666}.hide{display:none!important}[contenteditable=true]:focus{outline:2px solid #111;background:#fff8cf}.print-area{display:none}.warning{color:#a21d1d;font-weight:900}.ok{color:#166534;font-weight:900}@media(max-width:900px){.wrap{padding:0}.card{margin:0 8px 14px}.layout{display:block}.grid2{grid-template-columns:1fr}.reportbox{border-radius:0}.sheet{transform:scale(.34);transform-origin:top left;margin-bottom:-520px}h1{font-size:25px}.tab{font-size:16px}}

<body>
<header class="top"><h1>土地評估手機版應用程式 v4</h1><div class="subtxt">修正版：空白欄位自動補待查文字，列印改用純文字表格，避免 iPhone 只印數字。</div><nav class="tabs"><button class="tab on" onclick="tab('req',this)">調研需求</button><button class="tab" onclick="tab('json',this)">調研結果</button><button class="tab" onclick="tab('edit',this)">結論調整</button><button class="tab" onclick="tab('preview',this)">表格預覽</button></nav></header>
<main class="wrap">
<section id="req" class="page on"><div class="card"><h2>只輸入建設公司＋地段地號</h2><div class="notice">工具本身不會自動上網調研；請先產生調研指令貼給 ChatGPT。調研完成後，把 ChatGPT 回傳的 JSON 貼到「調研結果」，表格就會自動帶入，且每欄都可以改。</div><div class="field"><label>配合業主／建設公司名稱</label><input id="client" placeholder="例：弘峻建設"></div><div class="field"><label>土地地段與地號</label><textarea id="landIds" placeholder="例：桃園市中壢區環北段 149、149-1、149-2、150、151，共 5 筆地號"></textarea></div><div class="actions"><button onclick="makePrompt()">產生調研指令</button><button class="sec" onclick="copyPrompt()">複製調研指令</button><button class="sec" onclick="fillMissing();render()">先補待查欄位</button></div><textarea id="promptBox" style="min-height:360px"></textarea></div></section>
<section id="json" class="page"><div class="card"><h2>貼上 ChatGPT 調研 JSON</h2><div class="notice">如果沒有完整調研 JSON，表格會顯示「待查／待複核」；不會再出現大片空白。</div><textarea id="jsonBox" placeholder='請貼上 JSON，例如：{"client":"弘峻建設","location":"...","cases":[...]}' style="min-height:420px"></textarea><div class="actions"><button onclick="applyJson()">套用調研結果</button><button class="sec" onclick="downloadTemplate()">下載空白 JSON 模板</button></div></div></section>
<section id="edit" class="page"><div class="layout"><div class="card"><h2>結論與價格調整</h2><div class="grid2"><div class="field"><label>二樓以上住家</label><input id="price2f"></div><div class="field"><label>店面建議價格</label><input id="shopPrice"></div><div class="field"><label>店面預設倍率</label><input id="shopDefault" value="住家 × 1.5"></div><div class="field"><label>店面調整倍率</label><input id="shopAdjust" value="住家 × 1.2"></div><div class="field"><label>車位建議價格</label><input id="parkingPrice"></div><div class="field"><label>車位倍率</label><input id="parkingAdjust" value="預設住家 × 5；調整住家 × 4.2"></div></div><div class="field"><label>區域銷況</label><textarea id="market"></textarea></div><div class="field"><label>建議產品</label><textarea id="product"></textarea></div><div class="field"><label>優勢1</label><input id="adv1"></div><div class="field"><label>優勢2</label><input id="adv2"></div><div class="field"><label>優勢3</label><input id="adv3"></div><div class="field"><label>劣勢1</label><input id="weak1"></div><div class="field"><label>劣勢2</label><input id="weak2"></div><div class="field"><label>劣勢3</label><input id="weak3"></div><div class="actions"><button onclick="render();tabById('preview')">更新預覽</button><button class="sec" onclick="exportXlsx()">匯出 Excel</button><button class="sec" onclick="printReport()">列印 / 存 PDF</button></div></div><div class="reportbox"><div id="sheetEdit" class="sheet"></div></div></div></section>
<section id="preview" class="page"><div class="card"><h2>表格預覽</h2><p class="help">這裡的表格可直接點文字修改。按列印時，系統會轉成純文字列印版，避免中文字消失。</p><div class="actions"><button onclick="exportXlsx()">匯出 Excel</button><button class="sec" onclick="printReport()">列印 / 存 PDF</button></div></div><div class="reportbox"><div id="sheet" class="sheet"></div></div></section>
</main>
<div id="printArea" class="print-area"></div>
<script>
const fields='client,landIds,location,zoning,area,coverage,far,road,landPrice,school,village,siteSummary,north,west,south,east,traffic,amenity,publicWorks,market,product,price2f,shopPrice,shopDefault,shopAdjust,parkingPrice,parkingAdjust,adv1,adv2,adv3,weak1,weak2,weak3,mapNote'.split(',');
const defaults={location:'待調研／待依地號定位複核',zoning:'待查都市計畫土地使用分區證明',area:'待以土地謄本或地籍資料複核',coverage:'待依土地分區與都市計畫規定複核',far:'待依土地分區與都市計畫規定複核',road:'待以地籍圖、道路資料或現場照片複核',landPrice:'土地售價待業主提供／待複核',school:'待查該縣市教育局最新年度學區公告；需依正式門牌或里鄰別複核',village:'待依戶政／區公所里界資料複核',siteSummary:'本基地周遭現況為：待補現場環境、鄰地、臨路及小環境說明。',north:'待查北向臨路／臨房／鄰地狀況',west:'待查西向臨路／臨房／鄰地狀況',south:'待查南向臨路／臨房／鄰地狀況',east:'待查東向臨路／臨房／鄰地狀況',traffic:'待補捷運、國道、主要幹道、公車及通勤動線',amenity:'待補主要商圈、採買、餐飲、超市、市場與生活成熟度',publicWorks:'待補學校、公園、政府機關、醫療、重大建設與公共設施',market:'待依內政部實價登錄補充近半年／近一年成交行情與競案銷況',product:'待依競案產品結構回推兩房、三房、四房坪數建議',price2f:'待依實價登錄成交均價預判',shopPrice:'待依住家價格 × 1.2 調整倍率推估',parkingPrice:'待依住家價格 × 4.2 調整倍率推估',adv1:'待補優勢：區位／交通／價格／產品條件',adv2:'待補優勢：生活圈或重大建設支撐',adv3:'待補優勢：總價帶或順銷切入機會',weak1:'待補劣勢：生活機能、小環境或區域接受度抗性',weak2:'待補劣勢：近期成交價支撐或開價上緣限制',weak3:'待補劣勢：基地條件、規劃完整度或產品定價風險',mapNote:'此處可貼上區域圖／基地位置圖'};
let research={cases:[]};
function $(id){return document.getElementById(id)}function val(id){return ($(id)?.value||'').trim()}function setv(id,x){if($(id))$(id).value=x??''}function today(){const d=new Date();return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`}function esc(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function out(x,f='待查／待複核'){x=String(x??'').trim();return esc(x||f)}
function tab(id,b){document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));$(id).classList.add('on');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));if(b)b.classList.add('on');if(id==='preview'||id==='edit')render()}function tabById(id){document.querySelectorAll('.tab').forEach(b=>{if((id==='preview'&&b.textContent.includes('預覽'))||(id==='edit'&&b.textContent.includes('調整')))b.click()})}
function collect(){const d={...research};fields.forEach(f=>{const x=val(f);if(x)d[f]=x});d.client=d.client||val('client');d.landIds=d.landIds||val('landIds');d.date=d.date||today();return d}
function fillMissing(){fields.forEach(f=>{if(!val(f)&&defaults[f])setv(f,defaults[f])})}
function makePrompt(){const p=`請依照固定「海悅廣告 土地評估分析表」模式，幫我完成土地評估調研。\n\n配合業主：${val('client')}\n標的地號：${val('landIds')}\n調研時間：請抓今天日期\n\n請主動查詢並完成：標的位置、土地分區、基地面積、建蔽率、容積率、臨路條件、土地售價待複核、學區、里別、基地東南西北四向現況、交通動線、生活機能、公共建設、區域銷況、建議產品、價格預判、3點優勢、3點劣勢。\n\n學區請查該縣市教育局最新年度公開學區資料；里別請以戶政或區公所里界資料複核。\n\n競案調查請以基地周遭距離最近為優先，第一順位線上預售案，盡量找滿4個；不足時依序補屋齡5年內、5到10年、10到15年。價格必須採內政部實價登錄成交資料，591或樂居只能輔助找案名與產品，不採預售開價。每個競案都要顯示近半年成交均價/筆數、近一年成交均價/筆數、採用均價、採用期間。近一年無成交者剔除，補下一個有效競案。\n\n價格預判：二樓以上住家為基準；店面預設倍率住家×1.5，調整倍率住家×1.2；車位預設住家×5，調整住家×4.2。\n\n請輸出 JSON，欄位包含 client, landIds, date, location, zoning, area, coverage, far, road, landPrice, school, village, siteSummary, north, west, south, east, traffic, amenity, publicWorks, market, product, price2f, shopPrice, shopDefault, shopAdjust, parkingPrice, parkingAdjust, adv1, adv2, adv3, weak1, weak2, weak3, mapNote, cases。cases每筆包含 developer, project, type, age, distance, avg6, count6, avg12, count12, adoptedAvg, adoptedPeriod, rooms, sizeRange, parking, source, note。`; $('promptBox').value=p;return p}
async function copyPrompt(){if(!val('promptBox'))makePrompt();await navigator.clipboard.writeText(val('promptBox'));alert('已複製調研指令')}
function applyJson(){try{let t=val('jsonBox').replace(/^```json/i,'').replace(/```$/,'').trim();const d=JSON.parse(t);research=d;fields.forEach(f=>{if(d[f]!==undefined)setv(f,d[f])});render();alert('已套用調研結果')}catch(e){alert('JSON格式錯誤，請確認只貼JSON，不要貼其他文字。')}}
function fmtProd(c){return [c.rooms,c.sizeRange,c.parking?('車位 '+c.parking):''].filter(Boolean).join('｜')}
function caseRows(cases){let h='';for(let i=0;i<4;i++){const c=cases[i]||{};h+=`<tr><td>${i+1}</td><td contenteditable="true">${out(c.developer,'')}</td><td contenteditable="true">${out(c.project,'')}</td><td contenteditable="true">${out(c.type,'')}</td><td contenteditable="true">${out(c.age,'')}</td><td contenteditable="true">${out(c.avg6,'0')}萬/坪｜${out(c.count6,'0')}筆</td><td contenteditable="true">${out(c.avg12,'0')}萬/坪｜${out(c.count12,'0')}筆</td><td contenteditable="true">${out(c.adoptedAvg,'待查')}萬/坪</td><td contenteditable="true">${out(fmtProd(c),'待補產品規劃')}</td><td contenteditable="true">${out(c.note||c.adoptedPeriod,'待補採用依據')}</td></tr>`}return h}
function render(){const d=collect();const cases=d.cases||[];const html=`<table class="report" id="reportTable"><colgroup><col style="width:8%"><col style="width:10%"><col style="width:10%"><col style="width:10%"><col style="width:10%"><col style="width:10%"><col style="width:10%"><col style="width:10%"><col style="width:10%"><col style="width:12%"></colgroup><tr><td class="title" colspan="10">海悅廣告　土地評估分析表</td></tr><tr><td class="label">配合業主</td><td colspan="4" contenteditable="true">${out(d.client,'待填')}</td><td class="label">調研時間</td><td colspan="4" contenteditable="true">${out(d.date)}</td></tr><tr><td class="label">標的位置</td><td colspan="4" contenteditable="true">${out(d.location,defaults.location)}</td><td class="label">標的地號</td><td colspan="4" contenteditable="true">${out(d.landIds,'待填地號')}</td></tr><tr><td class="label">土地分區</td><td colspan="4" contenteditable="true">${out(d.zoning,defaults.zoning)}</td><td class="label">基地面積</td><td colspan="4" contenteditable="true">${out(d.area,defaults.area)}</td></tr><tr><td class="label">法定建蔽率</td><td colspan="4" contenteditable="true">${out(d.coverage,defaults.coverage)}</td><td class="label">法定容積率</td><td colspan="4" contenteditable="true">${out(d.far,defaults.far)}</td></tr><tr><td class="label">臨路條件</td><td colspan="4" contenteditable="true">${out(d.road,defaults.road)}</td><td class="label">土地售價</td><td colspan="4" contenteditable="true">${out(d.landPrice,defaults.landPrice)}</td></tr><tr><td class="label">學區</td><td colspan="4" contenteditable="true">${out(d.school,defaults.school)}</td><td class="label">里別</td><td colspan="4" contenteditable="true">${out(d.village,defaults.village)}</td></tr><tr><td class="label" rowspan="5">基地現況</td><td colspan="9" contenteditable="true">${out(d.siteSummary,defaults.siteSummary)}</td></tr><tr><td class="subcell">北向</td><td colspan="8" contenteditable="true">${out(d.north,defaults.north)}</td></tr><tr><td class="subcell">西向</td><td colspan="8" contenteditable="true">${out(d.west,defaults.west)}</td></tr><tr><td class="subcell">南向</td><td colspan="8" contenteditable="true">${out(d.south,defaults.south)}</td></tr><tr><td class="subcell">東向</td><td colspan="8" contenteditable="true">${out(d.east,defaults.east)}</td></tr><tr><td class="label">交通動線</td><td colspan="9" contenteditable="true">${out(d.traffic,defaults.traffic)}</td></tr><tr><td class="label">生活機能</td><td colspan="9" contenteditable="true">${out(d.amenity,defaults.amenity)}</td></tr><tr><td class="label">公共建設</td><td colspan="9" contenteditable="true">${out(d.publicWorks,defaults.publicWorks)}</td></tr><tr><td class="label">區域銷況</td><td colspan="9" contenteditable="true">${out(d.market,defaults.market)}</td></tr><tr><td class="label">建議產品</td><td colspan="9" contenteditable="true">${out(d.product,defaults.product)}</td></tr><tr><th>個案參考</th><th>建設公司</th><th>案名</th><th>類型</th><th>屋齡</th><th>近半年均價/筆數</th><th>近一年均價/筆數</th><th>採用均價</th><th>產品規劃</th><th>採用依據</th></tr>${caseRows(cases)}<tr><td class="label" rowspan="3">價格預判</td><td>二樓以上住家</td><td colspan="3" contenteditable="true">${out(d.price2f,defaults.price2f)}</td><td>店面</td><td colspan="2" contenteditable="true">${out(d.shopPrice,defaults.shopPrice)}</td><td colspan="2" contenteditable="true">${out(d.shopDefault,'住家 × 1.5')}／${out(d.shopAdjust,'住家 × 1.2')}</td></tr><tr><td>車位</td><td colspan="3" contenteditable="true">${out(d.parkingPrice,defaults.parkingPrice)}</td><td>車位倍率</td><td colspan="4" contenteditable="true">${out(d.parkingAdjust,'預設住家 × 5；調整住家 × 4.2')}</td></tr><tr><td colspan="9" contenteditable="true">店面以二樓以上住家價格倍率推估；車位以住家單價倍率推估，實際仍需依車位型態與區域接受度調整。</td></tr><tr><td class="label" rowspan="8">綜合評估</td><td colspan="9"><b>優勢：</b></td></tr><tr><td>1</td><td colspan="8" contenteditable="true">${out(d.adv1,defaults.adv1)}</td></tr><tr><td>2</td><td colspan="8" contenteditable="true">${out(d.adv2,defaults.adv2)}</td></tr><tr><td>3</td><td colspan="8" contenteditable="true">${out(d.adv3,defaults.adv3)}</td></tr><tr><td colspan="9"><b>劣勢：</b></td></tr><tr><td>1</td><td colspan="8" contenteditable="true">${out(d.weak1,defaults.weak1)}</td></tr><tr><td>2</td><td colspan="8" contenteditable="true">${out(d.weak2,defaults.weak2)}</td></tr><tr><td>3</td><td colspan="8" contenteditable="true">${out(d.weak3,defaults.weak3)}</td></tr><tr><td class="label">區域圖</td><td colspan="9"><div class="map" contenteditable="true">${out(d.mapNote,defaults.mapNote)}</div></td></tr></table>`;$('sheet').innerHTML=html;$('sheetEdit').innerHTML=html}
function printReport(){render();let html=$('sheet').innerHTML.replaceAll('contenteditable="true"','');$('printArea').innerHTML='<div class="sheet">'+html+'</div>';setTimeout(()=>window.print(),50)}
function exportXlsx(){render();const table=$('sheet').querySelector('#reportTable');const data=[];for(const tr of table.rows){const row=[];for(const cell of tr.cells)row.push(cell.innerText.trim());data.push(row)}const wb=XLSX.utils.book_new();const ws=XLSX.utils.aoa_to_sheet(data);ws['!cols']=[{wch:10},{wch:18},{wch:18},{wch:18},{wch:18},{wch:22},{wch:22},{wch:18},{wch:28},{wch:30}];XLSX.utils.book_append_sheet(wb,ws,'一頁式土地評估總表');XLSX.writeFile(wb,(val('client')||'土地評估')+'-土地評估分析表.xlsx')}
function downloadTemplate(){const d={client:val('client'),landIds:val('landIds'),date:today(),location:'',zoning:'',area:'',coverage:'',far:'',road:'',landPrice:'',school:'',village:'',siteSummary:'',north:'',west:'',south:'',east:'',traffic:'',amenity:'',publicWorks:'',market:'',product:'',price2f:'',shopPrice:'',shopDefault:'住家 × 1.5',shopAdjust:'住家 × 1.2',parkingPrice:'',parkingAdjust:'預設住家 × 5；調整住家 × 4.2',adv1:'',adv2:'',adv3:'',weak1:'',weak2:'',weak3:'',mapNote:'',cases:[]};const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='土地評估JSON模板.json';a.click()}
