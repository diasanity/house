<!doctype html>
<html lang="zh-Hant-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#203b35">
<title>弘峻莊園拆款計算機</title>
<style>
:root{--ink:#162421;--muted:#68736f;--line:#e3ded3;--gold:#b28a4c;--green:#203b35;--soft:#f4f0e7}*{box-sizing:border-box}html{height:100%}body{margin:0;height:100%;color:var(--ink);font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",Arial,sans-serif;background:linear-gradient(180deg,#f6efe2 0,#fbfaf7 320px,#f2f0ea 100%)}button,input{font:inherit}.app{width:min(100%,760px);min-height:100dvh;margin:auto;display:flex;flex-direction:column;background:rgba(255,255,255,.74);box-shadow:0 18px 38px rgba(32,59,53,.14)}header{position:relative;overflow:hidden;padding:24px 20px 21px;color:white;background:linear-gradient(135deg,#203b35,#142724);border-bottom:4px solid var(--gold)}header:after{content:"";position:absolute;right:-48px;top:-64px;width:190px;height:190px;border:1px solid rgba(239,228,206,.4);transform:rotate(18deg)}.eyebrow{position:relative;margin:0 0 7px;color:#efe4ce;font-size:12px;font-weight:800;letter-spacing:.14em}h1{position:relative;margin:0;font-family:"Noto Serif TC","Songti TC",serif;font-size:clamp(28px,7vw,44px);line-height:1.08}.sub{position:relative;margin:10px 0 0;color:rgba(255,255,255,.82);font-size:14px}.inputs{padding:18px;background:white;border-bottom:1px solid var(--line)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{min-width:0}label,.total-label{display:flex;justify-content:space-between;gap:8px;margin-bottom:6px;color:var(--muted);font-size:12px;font-weight:800}label span,.total-label span{color:#9a8b72;font-size:10px;letter-spacing:.08em}.control{display:flex;align-items:center;min-height:48px;padding:0 12px;background:white;border:1px solid var(--line);border-radius:8px}.control:focus-within{border-color:var(--gold);box-shadow:0 0 0 3px rgba(178,138,76,.16)}input{width:100%;min-width:0;border:0;outline:0;background:transparent;color:var(--ink);font-size:17px;font-weight:800}input::placeholder{color:#b7b0a5;font-weight:500}.unit{flex:0 0 auto;margin-left:8px;color:var(--gold);font-size:13px;font-weight:900}.total-card{margin-top:14px;padding:14px;background:linear-gradient(135deg,#f8f3e8,#eef5f0);border:1px solid #e3d7bf;border-radius:8px}.total-card .control{min-height:58px;border-color:rgba(178,138,76,.45)}.total-card input{text-align:right;font-size:clamp(26px,8vw,40px);font-variant-numeric:tabular-nums}.results{flex:1;padding:14px 18px 18px}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}.summary-card{min-width:0;padding:10px;background:rgba(255,255,255,.84);border:1px solid var(--line);border-radius:8px}.summary-card b{display:block;color:var(--muted);font-size:11px}.summary-card span{display:block;overflow:hidden;margin-top:3px;font-size:14px;font-weight:900;text-overflow:ellipsis;white-space:nowrap}.table{overflow:hidden;background:white;border:1px solid var(--line);border-radius:8px}.head,.row,.total{display:grid;grid-template-columns:minmax(0,1fr) 64px minmax(98px,.38fr);align-items:center;gap:8px}.head{padding:10px 12px;color:var(--muted);background:var(--soft);border-bottom:1px solid var(--line);font-size:12px;font-weight:900}.head div:nth-child(2),.head div:nth-child(3){text-align:right}.row{min-height:58px;padding:11px 12px;border-bottom:1px solid #eee9df}.row:nth-child(even){background:#fdfbf7}.name{min-width:0}.name strong{display:block;font-size:15px;line-height:1.38}.name small{display:block;margin-top:2px;color:var(--muted);font-size:12px;line-height:1.35}.ratio{color:#846c43;text-align:right;font-size:13px;font-weight:900}.value{text-align:right;font-size:18px;font-weight:900;font-variant-numeric:tabular-nums;white-space:nowrap}.total{padding:15px 12px;color:white;background:var(--green)}.total small,.total .ratio,.total .value{color:white}.total .value{font-size:21px}.actions{position:sticky;bottom:0;padding:12px 18px calc(12px + env(safe-area-inset-bottom));background:rgba(251,250,247,.9);border-top:1px solid var(--line);backdrop-filter:blur(14px)}.print{width:100%;min-height:50px;color:white;background:var(--gold);border:0;border-radius:8px;cursor:pointer;font-size:15px;font-weight:900;letter-spacing:.04em}@media(max-width:560px){html,body{width:100%;height:100dvh;overflow:hidden}.app{width:100%;height:100dvh;min-height:100dvh;overflow:hidden;box-shadow:none}header{height:13dvh;min-height:86px;flex:0 0 auto;padding:12px 14px 10px;border-bottom-width:3px}.eyebrow{font-size:10px;margin-bottom:4px}h1{font-size:28px}.sub{font-size:12px;margin-top:5px}.inputs{height:32dvh;min-height:226px;flex:0 0 auto;padding:9px 10px}.grid{gap:7px}.field label,.total-label{font-size:10px;margin-bottom:4px}.field label span,.total-label span{font-size:8px}.control{min-height:38px;padding:0 9px;border-radius:7px}input{font-size:15px}.unit{font-size:11px;margin-left:5px}.total-card{margin-top:8px;padding:8px;border-radius:7px}.total-card .control{min-height:42px}.total-card input{font-size:25px}.results{min-height:0;flex:1;display:flex;flex-direction:column;padding:7px 9px 6px}.summary{display:none}.table{min-height:0;flex:1;display:flex;flex-direction:column;border-radius:7px}.head,.row,.total{grid-template-columns:minmax(0,1fr) 42px 86px;gap:6px}.head{flex:0 0 auto;padding:5px 8px;font-size:10px}.row{min-height:0;flex:1;padding:4px 8px}.name strong{font-size:12px;line-height:1.1}.name small{font-size:9px;line-height:1.1}.ratio{font-size:11px}.value{font-size:14px}.total{flex:0 0 auto;padding:8px}.total .value{font-size:18px}.actions{position:static;flex:0 0 auto;padding:7px 10px calc(7px + env(safe-area-inset-bottom))}.print{min-height:42px;font-size:14px}}@media(max-width:380px){.inputs{height:34dvh;min-height:234px}.grid{gap:6px}.control{min-height:36px}.head,.row,.total{grid-template-columns:minmax(0,1fr) 38px 78px;gap:5px}.name strong{font-size:11px}.name small{font-size:8px}.ratio{font-size:10px}.value{font-size:13px}}@media print{@page{size:A4;margin:0}html,body{width:210mm;height:260mm;margin:0!important;padding:0!important;background:white!important;overflow:hidden!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}body{position:relative}.app{position:relative;width:190mm;height:258mm;min-height:0;margin:0 auto;display:flex;box-shadow:none;background:white;overflow:hidden;break-after:avoid;page-break-after:avoid}.actions,.inputs{display:none!important}header{height:36mm;flex:0 0 36mm;padding:8mm 9mm 6mm;border-bottom:1.4mm solid var(--gold);-webkit-print-color-adjust:exact;print-color-adjust:exact}header:after{right:-18mm;top:-24mm;width:62mm;height:62mm}.eyebrow{font-size:8pt;margin-bottom:1.7mm}h1{font-size:23pt;line-height:1.05}.sub{font-size:9pt;margin-top:2.5mm}.results{flex:1;min-height:0;display:flex;flex-direction:column;padding:0}.summary{height:20mm;flex:0 0 20mm;display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin:0;border-bottom:.25mm solid var(--line)}.summary-card{padding:4mm 3mm;border-radius:0;background:#fff;border:0;border-right:.25mm solid var(--line)}.summary-card:last-child{border-right:0}.summary-card b{font-size:7.5pt}.summary-card span{font-size:9.5pt;margin-top:1.4mm}.table{flex:1;min-height:0;display:flex;flex-direction:column;border-radius:0;border:0;background:white}.head,.row,.total{grid-template-columns:minmax(0,1fr) 22mm 33mm;gap:3mm}.head{height:11mm;flex:0 0 11mm;padding:3mm 7mm;font-size:8.7pt;border-bottom:.3mm solid var(--line)}#rows{flex:1;min-height:0;display:flex;flex-direction:column}.row{flex:1;min-height:0;padding:0 7mm;border-bottom:.25mm solid var(--line)}.name strong{font-size:10.5pt;line-height:1.18}.name small{font-size:8pt;line-height:1.12}.ratio{font-size:9.5pt}.value{font-size:13pt}.total{height:20mm;flex:0 0 20mm;padding:0 7mm;color:white;background:var(--green);-webkit-print-color-adjust:exact;print-color-adjust:exact}.total .value{font-size:16pt}.row:nth-child(even){background:#fdfbf7!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style>
</head>
<body>
<main class="app">
<header><p class="eyebrow">PAYMENT CALCULATOR</p><h1>弘峻莊園</h1><p class="sub">專屬拆款計算機</p></header>
<section class="inputs">
<div class="grid">
<div class="field"><label for="unitInput">戶別 <span>UNIT</span></label><div class="control"><input id="unitInput" placeholder="例如 A1-5F"></div></div>
<div class="field"><label for="sizeInput">戶別坪數 <span>SIZE</span></label><div class="control"><input id="sizeInput" type="number" step="0.01" inputmode="decimal" placeholder="0.00"><span class="unit">坪</span></div></div>
<div class="field"><label for="parkInput">車位 <span>PARKING</span></label><div class="control"><input id="parkInput" placeholder="例如 B2-18"></div></div>
<div class="field"><label for="parkPriceInput">車位價格 <span>PRICE</span></label><div class="control"><input id="parkPriceInput" type="number" step="1" inputmode="numeric" placeholder="0"><span class="unit">萬</span></div></div>
</div>
<div class="total-card"><label class="total-label" for="totalPrice">物業總額 <span>萬元</span></label><div class="control"><input id="totalPrice" type="number" value="733" step="1" inputmode="numeric"><span class="unit">萬</span></div></div>
</section>
<section class="results"><div class="summary" id="summary"></div><div class="table"><div class="head"><div>款項</div><div>比例</div><div>金額</div></div><div id="rows"></div><div class="total"><div class="name"><strong>合計總額</strong><small>TOTAL</small></div><div class="ratio">100%</div><div class="value" id="totalDisplay">0 萬</div></div></div></section>
<footer class="actions"><button class="print" id="printButton" type="button">產生正式報表</button></footer>
</main>
<script>
const f={unit:unitInput,size:sizeInput,parking:parkInput,parkingPrice:parkPriceInput,total:totalPrice};
const items=[['訂金','固定金額','固定',p=>p.dep],['簽約金','總價 6% 扣除訂金','6%',p=>p.sign],['工程款第一期','第一區屋頂版完成','2%',p=>p.e1],['工程款第二期','第二區屋頂版完成','2%',p=>p.e2],['工程款第三期','第三區屋頂版完成','2%',p=>p.e3],['備證用印款','尾差自動歸入此項','3%',p=>p.seal],['銀行貸款','總價 80%','80%',p=>p.bank],['交屋保留款','總價 5%','5%',p=>p.handOver]];
function money(v){return `${Number(v||0).toLocaleString('zh-TW')} 萬`}function show(v,s=''){v=String(v||'').trim();return v?`${v}${s}`:'—'}function calcParts(total){const dep=5,sign=Math.ceil(total*.06)-dep,e1=Math.round(total*.02),e2=Math.round(total*.02),e3=Math.round(total*.02),bank=Math.floor(total*.8),handOver=Math.ceil(total*.05),seal=total-(dep+sign+e1+e2+e3+bank+handOver);return{dep,sign,e1,e2,e3,bank,handOver,seal}}function card(k,v){const d=document.createElement('div');d.className='summary-card';const b=document.createElement('b');b.textContent=k;const s=document.createElement('span');s.textContent=v;d.append(b,s);return d}function row(i,p){const d=document.createElement('div');d.className='row';const n=document.createElement('div');n.className='name';const t=document.createElement('strong');t.textContent=i[0];const m=document.createElement('small');m.textContent=i[1];n.append(t,m);const r=document.createElement('div');r.className='ratio';r.textContent=i[2];const v=document.createElement('div');v.className='value';v.textContent=money(i[3](p));d.append(n,r,v);return d}function render(){const total=parseFloat(f.total.value)||0,p=calcParts(total);summary.replaceChildren(card('戶別',show(f.unit.value)),card('坪數',show(f.size.value,' 坪')),card('車位',show(f.parking.value)),card('車位價',show(f.parkingPrice.value,' 萬')));rows.replaceChildren(...items.map(i=>row(i,p)));totalDisplay.textContent=money(total)}Object.values(f).forEach(x=>x.addEventListener('input',render));printButton.addEventListener('click',()=>window.print());render();
</script>
</body>
</html>
