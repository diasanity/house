<style>
*{box-sizing:border-box}body{margin:0;background:#f4f1ea;color:#111;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif}.top{position:sticky;top:0;z-index:5;background:rgba(244,241,234,.96);border-bottom:1px solid #ddd;backdrop-filter:blur(10px)}h1{margin:0;padding:14px 14px 4px;font-size:25px}.sub{padding:0 14px 12px;color:#666;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tabs{display:flex;gap:10px;overflow-x:auto;padding:10px 12px 14px}.tab{border:2px solid #ddd;background:#fff;color:#111;border-radius:999px;padding:12px 18px;font-weight:900;font-size:16px;white-space:nowrap}.tab.on{background:#111;color:#fff;border-color:#111}.wrap{max-width:1180px;margin:0 auto;padding:14px}.card{background:#fff;border:1px solid #ddd;border-radius:22px;padding:18px;margin-bottom:14px;box-shadow:0 8px 24px rgba(0,0,0,.04)}h2{font-size:23px;margin:0 0 14px}.notice{background:#eaf8ee;border:1px solid #a7ddb3;color:#215f31;border-radius:18px;padding:14px 16px;line-height:1.7;font-weight:800;margin-bottom:16px}.field{margin:12px 0}.field label{display:block;font-weight:900;margin-bottom:7px}input,textarea{width:100%;border:1.5px solid #ccc;border-radius:15px;padding:13px 15px;font-size:17px;line-height:1.5;background:#fff}textarea{min-height:110px;resize:vertical}.actions{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}button{border:1px solid #111;background:#111;color:#fff;border-radius:14px;padding:12px 16px;font-weight:900;font-size:16px}button.sec{background:#fff;color:#111}.page{display:none}.page.on{display:block}.layout{display:grid;grid-template-columns:390px 1fr;gap:16px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.help{font-size:14px;color:#666;line-height:1.7}.reportbox{background:#d8d8d8;border-radius:18px;padding:12px;overflow:auto}.sheet{width:1180px;background:#fff;padding:14px;margin:0 auto}.report{width:100%;border-collapse:collapse;table-layout:fixed;font-size:12.5px;line-height:1.35;color:#111}.report td,.report th{border:1.2px solid #111;padding:6px 7px;vertical-align:top;white-space:pre-wrap;word-break:break-word;color:#111;-webkit-text-fill-color:#111}.report th{background:#f3eee5;text-align:center}.title{font-size:22px;font-weight:900;text-align:center;letter-spacing:.16em}.label{font-weight:900;text-align:center;background:#fff}.subcell{font-weight:900;text-align:center}.map{height:210px;display:flex;align-items:center;justify-content:center;background:linear-gradient(45deg,transparent 48%,#eee 49%,#eee 51%,transparent 52%),linear-gradient(-45deg,transparent 48%,#eee 49%,#eee 51%,transparent 52%);background-size:24px 24px;color:#666}.print-area{display:none}[contenteditable=true]:focus{outline:2px solid #111;background:#fff8cf}@media(max-width:900px){.wrap{padding:0}.card{margin:0 8px 14px}.layout{display:block}.grid2{grid-template-columns:1fr}.reportbox{border-radius:0}.sheet{transform:scale(.32);transform-origin:top left;margin-bottom:-570px}h1{font-size:24px}.tab{font-size:16px}}@page{size:A4 landscape;margin:8mm}@media print{body{background:#fff!important}.top,.wrap{display:none!important}.print-area{display:block!important;position:absolute;left:0;top:0;width:100%;background:#fff}.print-area *{color:#000!important;-webkit-text-fill-color:#000!important;box-shadow:none!important;text-shadow:none!important}.print-area .sheet{width:100%!important;transform:none!important;margin:0!important;padding:0!important}.print-area .report{font-size:9.2px!important}.print-area td,.print-area th{padding:3.5px 4px!important;border:1px solid #000!important}.print-area .title{font-size:16px!important}.print-area .map{height:150px!important;background:#fff!important}}

<body>
<header class="top"><h1>土地評估手機版應用程式｜Final</h1><div class="sub">新版獨立程式：競案必填建設公司、案名、距離、屋齡；劣勢不得寫待複核事項。</div><nav class="tabs"><button class="tab on" onclick="tab('req',this)">調研需求</button><button class="tab" onclick="tab('json',this)">調研結果</button><button class="tab" onclick="tab('edit',this)">結論調整</button><button class="tab" onclick="tab('preview',this)">表格預覽</button></nav></header>
<main class="wrap">
<section id="req" class="page on"><div class="card"><h2>只輸入建設公司＋地段地號</h2><div class="notice">此版本為全新獨立 App，不覆蓋舊版。輸入建設公司與地號後，產生完整調研指令，貼給 ChatGPT；再把回傳 JSON 貼回本工具即可產表。</div><div class="field"><label>配合業主／建設公司名稱</label><input id="client" placeholder="例：弘峻建設"></div><div class="field"><label>土地地段與地號</label><textarea id="landIds" placeholder="例：桃園市中壢區環北段149、149-1、149-2、150、151地號"></textarea></div><div class="actions"><button onclick="makePrompt()">產生最終版調研指令</button><button class="sec" onclick="copyPrompt()">複製調研指令</button><button class="sec" onclick="fillMissing();render()">先補待查欄位</button></div><textarea id="promptBox" style="min-height:560px"></textarea></div></section>
<section id="json" class="page"><div class="card"><h2>貼上 ChatGPT 調研 JSON</h2><div class="notice">請只貼 JSON。貼上後，系統會依一頁式土地評估表帶入，並保留每欄可修改。</div><textarea id="jsonBox" placeholder='請貼上 JSON' style="min-height:420px"></textarea><div class="actions"><button onclick="applyJson()">套用調研結果</button><button class="sec" onclick="downloadTemplate()">下載 JSON 模板</button></div></div></section>
<section id="edit" class="page"><div class="layout"><div class="card"><h2>結論與價格調整</h2><div class="grid2"><div class="field"><label>住家表價</label><input id="listPrice"></div><div class="field"><label>目標成交均價</label><input id="dealAvg"></div><div class="field"><label>首波成交帶</label><input id="firstWave"></div><div class="field"><label>高樓拉價空間</label><input id="highFloor"></div><div class="field"><label>店面建議價格</label><input id="shopPrice"></div><div class="field"><label>車位建議價格</label><input id="parkingPrice"></div></div><div class="field"><label>區域銷況</label><textarea id="market"></textarea></div><div class="field"><label>建議產品</label><textarea id="product"></textarea></div><div class="field"><label>初步結論</label><textarea id="conclusion"></textarea></div><div class="grid2"><div class="field"><label>優勢1</label><input id="adv1"></div><div class="field"><label>劣勢1</label><input id="weak1"></div><div class="field"><label>優勢2</label><input id="adv2"></div><div class="field"><label>劣勢2</label><input id="weak2"></div><div class="field"><label>優勢3</label><input id="adv3"></div><div class="field"><label>劣勢3</label><input id="weak3"></div></div><div class="actions"><button onclick="render();tabById('preview')">更新預覽</button><button class="sec" onclick="exportXlsx()">匯出 Excel</button><button class="sec" onclick="printReport()">列印 / 存 PDF</button></div></div><div class="reportbox"><div id="sheetEdit" class="sheet"></div></div></div></section>
<section id="preview" class="page"><div class="card"><h2>表格預覽</h2><p class="help">表格文字可直接修改。列印時會轉成純文字列印版，避免 iPhone Safari 中文消失。</p><div class="actions"><button onclick="exportXlsx()">匯出 Excel</button><button class="sec" onclick="printReport()">列印 / 存 PDF</button></div></div><div class="reportbox"><div id="sheet" class="sheet"></div></div></section>
</main><div id="printArea" class="print-area"></div>
<script>
const fields='client,landIds,location,zoning,coverage,far,road,landPrice,school,village,siteSummary,north,south,west,east,traffic,amenity,publicWorks,market,product,listPrice,dealAvg,firstWave,highFloor,shopPrice,shopDefault,shopAdjust,parkingFormula,parkingMarket,parkingPrice,parkingNote,adv1,adv2,adv3,weak1,weak2,weak3,conclusion,mapNote'.split(',');
const defaults={location:'待調研：需轉換為實際道路＋生活圈描述',zoning:'待查都市計畫圖／土地使用分區系統',coverage:'待查都市計畫書或細部計畫，不可用常見值推估',far:'待查都市計畫書，不可用常見值推估',road:'待以地籍圖、實際地圖、衛星圖或街景複核',landPrice:'待複核',school:'待查教育局最新年度國小／國中學區公告；若門牌未確認，待門牌複核',village:'待查戶政／區公所里界資料；若門牌未確認，待門牌複核',siteSummary:'本基地周遭現況為：待依使用者圖資、地籍圖、實際地圖、衛星圖、街景逐向判讀。',north:'待查：需寫明臨路路名＋路寬／臨房型態＋樓層／臨地現況／特殊抗性',south:'待查：需寫明臨路路名＋路寬／臨房型態＋樓層／臨地現況／特殊抗性',west:'待查：需寫明臨路路名＋路寬／臨房型態＋樓層／臨地現況／特殊抗性',east:'待查：需寫明臨路路名＋路寬／臨房型態＋樓層／臨地現況／特殊抗性',traffic:'待補主要幹道、國道／快速道路、捷運現況與未來、公車，並轉化為對銷售影響',amenity:'待補商圈、超市、市場、餐飲、醫療，並判斷成熟／發展中',publicWorks:'待補已完成建設與未來建設，並區分立即機能 vs 未來題材',market:'待依競案實價登錄成交資料判斷區域支撐力與順銷價',product:'待依競案產品規劃回推兩房、三房坪數；不建議產品需寫原因',listPrice:'待依競案成交均價推估表價',dealAvg:'待依二樓以上住家實價成交均價推估',firstWave:'待依順銷目標設定首波成交帶',highFloor:'待依樓層、景觀、產品條件設定拉價空間',shopPrice:'待依住家 × 1.2 調整倍率推估',shopDefault:'住家 × 1.5',shopAdjust:'住家 × 1.2',parkingFormula:'預設：住家 × 5；調整：住家 × 4.2',parkingMarket:'待查周邊單一坡平車位實價；雙車位需拆分、機械車位分開看',parkingPrice:'待依公式與周邊車位實價雙軌判斷',parkingNote:'待補公式 vs 市場比對說明',adv1:'待補優勢：需連動基地、交通、機能、價格、產品',adv2:'待補優勢：需連動基地、交通、機能、價格、產品',adv3:'待補優勢：需連動基地、交通、機能、價格、產品',weak1:'待補劣勢：只寫已確認抗性，不寫待複核事項',weak2:'待補劣勢：只寫已確認抗性，不寫待複核事項',weak3:'待補劣勢：只寫已確認抗性，不寫待複核事項',conclusion:'待補初步結論：需可直接轉 Excel、簡報或業主報告',mapNote:'此處可貼上區域圖／基地位置圖'};
let research={cases:[],landArea:{parcels:[],total:''}};
function $(id){return document.getElementById(id)}function val(id){return ($(id)?.value||'').trim()}function setv(id,x){if($(id))$(id).value=x??''}function today(){const d=new Date();return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`}function esc(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function out(x,f='待查／待複核'){x=String(x??'').trim();return esc(x||f)}function num(x){const m=String(x??'').match(/\d+(\.\d+)?/);return m?parseFloat(m[0]):NaN}
function tab(id,b){document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));$(id).classList.add('on');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));if(b)b.classList.add('on');if(id==='preview'||id==='edit')render()}function tabById(id){document.querySelectorAll('.tab').forEach(b=>{if((id==='preview'&&b.textContent.includes('預覽'))||(id==='edit'&&b.textContent.includes('調整')))b.click()})}
function collect(){const d={...research};fields.forEach(f=>{const x=val(f);if(x)d[f]=x});d.client=d.client||val('client');d.landIds=d.landIds||val('landIds');d.date=d.date||today();return derive(d)}
function derive(d){const base=num(d.dealAvg||d.price2f);if(!isNaN(base)){if(!d.shopPrice)d.shopPrice=`預設 ${Math.round(base*1.5)} 萬/坪；調整 ${Math.round(base*1.2)} 萬/坪`;if(!d.parkingPrice)d.parkingPrice=`公式預設 ${Math.round(base*5)} 萬/位；調整 ${Math.round(base*4.2)} 萬/位，仍需比對周邊單一坡平車位實價`;}
if(d.cases){d.effectiveCases=d.cases.map(c=>{const c6=Number(c.count6||0),c12=Number(c.count12||0);let adoptedPeriod='',adoptedAvg='',status='';if(c6>=3){adoptedPeriod='近半年';adoptedAvg=c.avg6;status='有效：近半年≥3筆'}else if(c12>=3){adoptedPeriod='近一年';adoptedAvg=c.avg12;status='有效：近半年不足3筆，採近一年'}else{adoptedPeriod='剔除';adoptedAvg='';status='剔除：近一年不足3筆'}return {...c,adoptedPeriod:c.adoptedPeriod||adoptedPeriod,adoptedAvg:c.adoptedAvg||adoptedAvg,status:c.status||status}}).filter(c=>c.adoptedPeriod!=='剔除').slice(0,4)}return d}
function fillMissing(){fields.forEach(f=>{if(!val(f)&&defaults[f])setv(f,defaults[f])})}
function makePrompt(){const p=`【海悅廣告｜土地評估調研邏輯｜最終版】\n\n請依照固定「海悅廣告 土地評估分析表」模式完成土地評估調研，最後只輸出可貼入 App 的 JSON，不要加任何其他說明文字。\n\n一、基本資料\n1. 配合業主：${val('client')}\n2. 調研時間：請抓今天日期。\n3. 標的位置：需將地號位置轉換為「實際道路＋生活圈描述」，不可只寫行政區。\n4. 標的地號：${val('landIds')}，需逐筆列出，不可只寫共幾筆。\n5. 土地售價：使用者未提供，一律寫「待複核」。\n\n二、基地面積\n必須逐筆查詢每一個地號實際坪數，每筆單獨列出，最後加總。查不到標註「該筆待謄本／地籍資料複核」。禁止用區域推估、禁止只寫總坪數、禁止未查證直接填寫。JSON格式：landArea:{parcels:[{id:'地號',area:'坪數',note:'資料來源或待複核說明'}],total:'總坪數'}。\n\n三、土地分區／建蔽率／容積率\n土地分區需查都市計畫圖、土地使用分區系統或分區證明資料。建蔽率與容積率需查都市計畫書、細部計畫或明確規定，不可用常見住宅區數值推估。查不到標註「待都市計畫書／分區證明複核」。\n\n四、基地四向現況\n方位優先東、南、西、北，斜向才用東北、西北、西南、東南。每一向必寫：臨路＝路名＋路寬；臨房＝建物型態＋樓層；臨地＝空地／停車場／未開發地；臨公設＝公園／學校等；特殊抗性＝廟宇、工廠、高壓電、鐵道、墓地、嫌惡設施、道路狹窄、出入不便等。資料來源優先：使用者圖資＞地籍圖＞實際地圖＞衛星圖＞街景。禁止只寫「住宅街廓／待複核」。\n\n五、學區與里別\n國小與國中需查該縣市教育局最新年度公開學區公告或學區查詢系統。里別需查戶政事務所、區公所里界資料、村里界線或正式行政資料。若基地尚未有門牌，標註「待門牌複核」。不可只依鄰近學校或地圖位置推估。\n\n六、交通動線\n整理主要幹道、國道、快速道路、捷運現況、捷運未來規劃、公車與通勤方向。不能只列交通設施，必須轉化為對銷售的影響，並判斷是立即交通優勢或未來題材。\n\n七、生活機能\n整理商圈、超市、傳統市場、餐飲、醫療、便利商店、學校、公園與日常採買距離，並判斷成熟、發展中、依賴外圍商圈、步行機能不足或車行生活圈為主。\n\n八、公共建設\n整理已完成建設與未來建設，包含捷運、道路、社宅、學校、公園、行政中心、運動中心、圖書館、醫療、產業園區、重劃區或重大開發。需區分「立即機能」與「未來題材」，不可把未來題材寫得像已完成。\n\n九、競案調查\n篩選順序：距離基地最近優先；預售案優先找滿4個；不足補屋齡5年內新成屋；再不足補5～10年中古屋；再不足補10～15年中古屋。\n有效競案條件：同生活圈、距離基地具比較性、有實價登錄成交資料、客戶實際會比較、產品可比、案名可確認、建設公司或投資興建方需查詢、屋齡與距離基地距離不可空白。\n必須剔除：一樓店面交易、純車位交易、特殊交易、親友交易、明顯異常交易、近一年有效成交筆數不足3筆個案、無成交資料個案。\n成交規則：近半年有效成交筆數≥3筆，採近半年成交均價；近半年不足3筆，改採近一年成交均價；近一年有效成交筆數<3筆，剔除不列入正式競案表；即使採近半年，也需同步顯示近一年均價與筆數。價格必須採內政部實價登錄成交資料，591、樂居、建案官網只能作為案名、產品規劃、建設公司、銷售狀態輔助資料，不可用預售開價取代成交均價。\n每一筆競案必填：developer建設公司／投資興建公司、project案名／社區名稱、type預售案／新成屋／中古屋、age屋齡、distance距離基地、avg6、count6、avg12、count12、adoptedAvg、adoptedPeriod、rooms、sizeRange、parking、source、note。developer、project、type、age、distance 不得空白。若公開資料無法確認建設公司，寫「待查／公開資料未明確揭露」；屋齡無法確認寫「待查／需以謄本或建物資料複核」；距離無法精準計算寫「約X公尺／約X公里，需以地圖複核」。\n\n十、價格預判：住家\n基準為二樓以上住家，依競案實價登錄成交均價判斷。目標是順銷價，不是區域最高價。需輸出建議表價、目標成交均價、首波成交帶、高樓層或條件佳戶拉價空間。若區域成交支撐不足，不可過度挑戰高價。\n\n十一、店面價格\n店面以二樓以上住家價格為基準。預設倍率住家×1.5；調整倍率住家×1.2。目前市況較弱時，優先以調整倍率作為務實基準。需考量面寬、路寬、人流、商業性、角地、主動線、停車便利性與租賃需求。\n\n十二、車位價格\n採雙軌判斷。第一軌公式推算：預設二樓以上住家單價×5，調整二樓以上住家單價×4.2。第二軌周邊實價：只採單一坡平車位作為主要比較；雙車位必須拆分；機械車位分開看；高價檢查是否雙車位；低價檢查是否機械或特殊交易；純車位交易與住宅搭售車位分開判斷。需輸出公式預設價格、公式調整價格、周邊單一坡平車位實價區間、建議開價區間、公式 vs 市場比對說明。\n\n十三、產品規劃\n依基地條件、競案產品結構、區域客群與總價帶回推。只列明確房型，不使用彈性產品或2+1房，不列過多模糊選項。不建議產品需寫明原因。固定輸出兩房約XX–XX坪、三房約XX–XX坪；四房若不建議，需寫明原因；若可規劃，僅建議少量配置。\n\n十四、綜合評估\n固定輸出優勢3點、劣勢3點、初步結論，需連動基地條件、交通動線、生活機能、公共建設、競案成交、價格支撐、產品規劃與開案順銷難度。\n優勢需具體，可從交通便利性、生活圈成熟度、價格切入、重大建設題材、競案成交支撐、產品規劃機會、基地曝光或臨路條件整理。\n劣勢3點必須是已確認、可從調研結果判斷的開案抗性，例如已確認生活機能不足、小環境較弱、成交價支撐不足、競案價格壓力、基地條件限制、產品規劃抗性、總價帶承受度有限、道路／面寬／棟距／基地形狀影響規劃。若某項內容仍屬待複核、待查證、待提供資料，不得寫入劣勢，應改列於資料備註或不列入，並改寫其他已確認劣勢。禁止將「待複核」本身寫成劣勢。\n\n十五、輸出原則\n報告需可直接轉 Excel、簡報與業主初評報告。不確定資料一律標註待複核、待提供、依業主資料或依公開資料初判。不可把未查證資料寫成確定事實，不可用區域平均值替代實際資料，不可用推估數據當成查證結果。所有價格都要有邏輯依據，所有競案都要有實價登錄成交依據。\n\n請只輸出 JSON，不要加其他說明文字。JSON 欄位包含：client, date, location, landIds, landPrice, landArea, zoning, coverage, far, road, school, village, siteSummary, north, south, west, east, traffic, amenity, publicWorks, market, product, listPrice, dealAvg, firstWave, highFloor, shopPrice, shopDefault, shopAdjust, parkingFormula, parkingMarket, parkingPrice, parkingNote, adv1, adv2, adv3, weak1, weak2, weak3, conclusion, mapNote, cases。`; $('promptBox').value=p;return p}
async function copyPrompt(){if(!val('promptBox'))makePrompt();await navigator.clipboard.writeText(val('promptBox'));alert('已複製最終版調研指令')}
function applyJson(){try{let t=val('jsonBox').replace(/^```json/i,'').replace(/```$/,'').trim();research=JSON.parse(t);fields.forEach(f=>{if(research[f]!==undefined)setv(f,research[f])});render();alert('已套用最終版調研結果')}catch(e){alert('JSON格式錯誤，請確認只貼JSON。')}}
function landAreaText(a){if(!a)return defaults.area||'待查';if(typeof a==='string')return a;const rows=(a.parcels||[]).map(p=>`${p.id||p.landId||'地號'}：${p.area||'待謄本／地籍資料複核'}${p.note?'（'+p.note+'）':''}`);if(a.total)rows.push(`合計：${a.total}`);return rows.join('\n')||'待逐筆查詢各地號實際坪數並加總'}
function prod(c){return [c.rooms,c.sizeRange,c.parking?('車位 '+c.parking):''].filter(Boolean).join('｜')}
function distanceAge(c){return `距離：${c.distance||'待以地圖複核'}\n屋齡：${c.age||'待以建物資料複核'}`}
function caseRows(cases){let h='';for(let i=0;i<4;i++){const c=cases[i]||{};h+=`<tr><td>${i+1}</td><td contenteditable="true">${out(c.developer,'待查／公開資料未明確揭露')}</td><td contenteditable="true">${out(c.project,'待查案名')}</td><td contenteditable="true">${out(c.type,'待查類型')}</td><td contenteditable="true">${out(distanceAge(c),'距離：待以地圖複核\n屋齡：待以建物資料複核')}</td><td contenteditable="true">${out(c.avg6,'0')}萬/坪｜${out(c.count6,'0')}筆</td><td contenteditable="true">${out(c.avg12,'0')}萬/坪｜${out(c.count12,'0')}筆</td><td contenteditable="true">${out(c.adoptedAvg,'待查')}萬/坪</td><td contenteditable="true">${out(prod(c),'待補產品規劃')}</td><td contenteditable="true">${out(c.status||c.note||c.adoptedPeriod,'待補採用依據')}</td></tr>`}return h}
function render(){const d=collect(), cases=d.effectiveCases||[];const html=`<table class="report" id="reportTable"><colgroup><col style="width:8%"><col style="width:10%"><col style="width:10%"><col style="width:10%"><col style="width:10%"><col style="width:10%"><col style="width:10%"><col style="width:10%"><col style="width:10%"><col style="width:12%"></colgroup><tr><td class="title" colspan="10">海悅廣告　土地評估分析表</td></tr><tr><td class="label">配合業主</td><td colspan="4" contenteditable="true">${out(d.client,'待填')}</td><td class="label">調研時間</td><td colspan="4" contenteditable="true">${out(d.date)}</td></tr><tr><td class="label">標的位置</td><td colspan="4" contenteditable="true">${out(d.location,defaults.location)}</td><td class="label">標的地號</td><td colspan="4" contenteditable="true">${out(d.landIds,'待填地號')}</td></tr><tr><td class="label">土地分區</td><td colspan="4" contenteditable="true">${out(d.zoning,defaults.zoning)}</td><td class="label">基地面積</td><td colspan="4" contenteditable="true">${out(landAreaText(d.landArea),defaults.area)}</td></tr><tr><td class="label">法定建蔽率</td><td colspan="4" contenteditable="true">${out(d.coverage,defaults.coverage)}</td><td class="label">法定容積率</td><td colspan="4" contenteditable="true">${out(d.far,defaults.far)}</td></tr><tr><td class="label">臨路條件</td><td colspan="4" contenteditable="true">${out(d.road,defaults.road)}</td><td class="label">土地售價</td><td colspan="4" contenteditable="true">${out(d.landPrice,defaults.landPrice)}</td></tr><tr><td class="label">學區</td><td colspan="4" contenteditable="true">${out(d.school,defaults.school)}</td><td class="label">里別</td><td colspan="4" contenteditable="true">${out(d.village,defaults.village)}</td></tr><tr><td class="label" rowspan="5">基地現況</td><td colspan="9" contenteditable="true">${out(d.siteSummary,defaults.siteSummary)}</td></tr><tr><td class="subcell">北向</td><td colspan="8" contenteditable="true">${out(d.north,defaults.north)}</td></tr><tr><td class="subcell">南向</td><td colspan="8" contenteditable="true">${out(d.south,defaults.south)}</td></tr><tr><td class="subcell">西向</td><td colspan="8" contenteditable="true">${out(d.west,defaults.west)}</td></tr><tr><td class="subcell">東向</td><td colspan="8" contenteditable="true">${out(d.east,defaults.east)}</td></tr><tr><td class="label">交通動線</td><td colspan="9" contenteditable="true">${out(d.traffic,defaults.traffic)}</td></tr><tr><td class="label">生活機能</td><td colspan="9" contenteditable="true">${out(d.amenity,defaults.amenity)}</td></tr><tr><td class="label">公共建設</td><td colspan="9" contenteditable="true">${out(d.publicWorks,defaults.publicWorks)}</td></tr><tr><td class="label">區域銷況</td><td colspan="9" contenteditable="true">${out(d.market,defaults.market)}</td></tr><tr><td class="label">建議產品</td><td colspan="9" contenteditable="true">${out(d.product,defaults.product)}</td></tr><tr><th>個案參考</th><th>建設公司</th><th>案名</th><th>類型</th><th>距離/屋齡</th><th>近半年均價/筆數</th><th>近一年均價/筆數</th><th>採用均價</th><th>產品規劃</th><th>採用依據</th></tr>${caseRows(cases)}<tr><td class="label" rowspan="5">價格預判</td><td>住家表價</td><td colspan="3" contenteditable="true">${out(d.listPrice,defaults.listPrice)}</td><td>成交均價</td><td colspan="4" contenteditable="true">${out(d.dealAvg,defaults.dealAvg)}</td></tr><tr><td>首波成交帶</td><td colspan="3" contenteditable="true">${out(d.firstWave,defaults.firstWave)}</td><td>高樓拉價</td><td colspan="4" contenteditable="true">${out(d.highFloor,defaults.highFloor)}</td></tr><tr><td>店面</td><td colspan="3" contenteditable="true">${out(d.shopPrice,defaults.shopPrice)}</td><td>店面倍率</td><td colspan="4" contenteditable="true">預設：${out(d.shopDefault,'住家 × 1.5')}；調整：${out(d.shopAdjust,'住家 × 1.2')}</td></tr><tr><td>車位</td><td colspan="3" contenteditable="true">${out(d.parkingPrice,defaults.parkingPrice)}</td><td>車位公式</td><td colspan="4" contenteditable="true">${out(d.parkingFormula,defaults.parkingFormula)}</td></tr><tr><td>車位市場</td><td colspan="8" contenteditable="true">${out(d.parkingMarket,defaults.parkingMarket)}\n${out(d.parkingNote,defaults.parkingNote)}</td></tr><tr><td class="label" rowspan="8">綜合評估</td><td colspan="9"><b>優勢：</b></td></tr><tr><td>1</td><td colspan="8" contenteditable="true">${out(d.adv1,defaults.adv1)}</td></tr><tr><td>2</td><td colspan="8" contenteditable="true">${out(d.adv2,defaults.adv2)}</td></tr><tr><td>3</td><td colspan="8" contenteditable="true">${out(d.adv3,defaults.adv3)}</td></tr><tr><td colspan="9"><b>劣勢：</b></td></tr><tr><td>1</td><td colspan="8" contenteditable="true">${out(d.weak1,defaults.weak1)}</td></tr><tr><td>2</td><td colspan="8" contenteditable="true">${out(d.weak2,defaults.weak2)}</td></tr><tr><td>3</td><td colspan="8" contenteditable="true">${out(d.weak3,defaults.weak3)}</td></tr><tr><td class="label">初步結論</td><td colspan="9" contenteditable="true">${out(d.conclusion,defaults.conclusion)}</td></tr><tr><td class="label">區域圖</td><td colspan="9"><div class="map" contenteditable="true">${out(d.mapNote,defaults.mapNote)}</div></td></tr></table>`;$('sheet').innerHTML=html;$('sheetEdit').innerHTML=html}
function printReport(){render();$('printArea').innerHTML='<div class="sheet">'+$('sheet').innerHTML.replaceAll('contenteditable="true"','')+'</div>';setTimeout(()=>window.print(),50)}
function exportXlsx(){render();const table=$('sheet').querySelector('#reportTable'),data=[];for(const tr of table.rows){const row=[];for(const cell of tr.cells)row.push(cell.innerText.trim());data.push(row)}const wb=XLSX.utils.book_new(),ws=XLSX.utils.aoa_to_sheet(data);ws['!cols']=[{wch:10},{wch:18},{wch:18},{wch:18},{wch:18},{wch:22},{wch:22},{wch:18},{wch:28},{wch:32}];XLSX.utils.book_append_sheet(wb,ws,'一頁式土地評估總表');XLSX.writeFile(wb,(val('client')||'土地評估')+'-土地評估分析表.xlsx')}
function downloadTemplate(){const d={client:val('client'),landIds:val('landIds'),date:today(),landPrice:'待複核',landArea:{parcels:[],total:''},shopDefault:'住家 × 1.5',shopAdjust:'住家 × 1.2',parkingFormula:'預設：住家 × 5；調整：住家 × 4.2',cases:[]};const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='土地評估最終版JSON模板.json';a.click()}
window.addEventListener('input',e=>{if(fields.includes(e.target.id))research[e.target.id]=e.target.value});render();makePrompt();
</script>
